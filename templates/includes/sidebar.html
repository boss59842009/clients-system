{% load static %}
<!-- Left Navbar -->
<aside class="admin-sidebar" id="adminSidebar" aria-label="Main navigation">
    <div class="sidebar-header">
        <a class="brand-mark" href="{% url 'index' %}" aria-label="adminHMD dashboard">
            <span class="brand-icon"><i class="bi bi-grid-1x2-fill" aria-hidden="true"></i></span>
            <span class="brand-copy">
            <span class="brand-title">Адмінка</span>
            <span class="brand-subtitle">Адмін панель</span>
          </span>
        </a>
    </div>

    <nav class="sidebar-nav">
        <a class="nav-link {% if request.resolver_match.url_name == 'index' %}active{% endif %}" href="{% url 'index' %}">
            <span class="nav-icon"><i class="bi bi-speedometer2" aria-hidden="true"></i></span>
            <span class="nav-text">Головна</span>
        </a>
        <a class="nav-link {% if request.resolver_match.url_name == 'appointments-calendar' %}active{% endif %}" href="{% url 'appointments-calendar' %}">
            <span class="nav-icon"><i class="bi bi-calendar-plus" aria-hidden="true"></i></span>
            <span class="nav-text">Записи</span>
        </a>
        <a class="nav-link {% if request.resolver_match.url_name == 'clients-list' %}active{% endif %}" href="{% url 'clients-list' %}">
            <span class="nav-icon"><i class="bi bi-person-vcard" aria-hidden="true"></i></span>
            <span class="nav-text">Клієнти</span>
        </a>
        <a class="nav-link {% if request.resolver_match.url_name == 'procedures-list' %}active{% endif %}" href="{% url 'procedures-list' %}">
            <span class="nav-icon"><i class="bi bi-stars" aria-hidden="true"></i></span>
            <span class="nav-text">Послуги</span>
        </a>
        <a class="nav-link {% if request.resolver_match.url_name == 'masters-list' %}active{% endif %}" href="{% url 'masters-list' %}">
            <span class="nav-icon"><i class="bi bi-person-circle" aria-hidden="true"></i></span>
            <span class="nav-text">Майстри</span>
        </a>
        {% comment %} <a class="nav-link" href="tables.html">
            <span class="nav-icon"><i class="bi bi-table" aria-hidden="true"></i></span>
            <span class="nav-text">Tables</span>
        </a>
        <a class="nav-link" href="forms.html">
            <span class="nav-icon"><i class="bi bi-ui-checks-grid" aria-hidden="true"></i></span>
            <span class="nav-text">Forms</span>
        </a>
        <a class="nav-link" href="components.html">
            <span class="nav-icon"><i class="bi bi-grid-3x3-gap" aria-hidden="true"></i></span>
            <span class="nav-text">Components</span>
        </a>
        <a class="nav-link" href="alerts.html">
            <span class="nav-icon"><i class="bi bi-exclamation-triangle" aria-hidden="true"></i></span>
            <span class="nav-text">Alerts</span>
        </a>
        <a class="nav-link" href="modals.html">
            <span class="nav-icon"><i class="bi bi-window-stack" aria-hidden="true"></i></span>
            <span class="nav-text">Modals</span>
        </a>
        <a class="nav-link" href="settings.html">
            <span class="nav-icon"><i class="bi bi-gear" aria-hidden="true"></i></span>
            <span class="nav-text">Settings</span>
        </a> {% endcomment %}
    </nav>

    <div class="sidebar-user">
        <img class="avatar-img avatar-md sidebar-user-avatar" src="{% static 'images/avatar/avatar.jpg' %}"
             alt="Admin Hasan">
        <strong>{{ request.user.last_name }} {{ request.user.first_name }}</strong>
        <small>Active Workspace</small>
    </div>

    <div class="sidebar-footer">
        <span class="status-dot"></span>
        <span class="sidebar-footer-text">System running smoothly</span>
    </div>
</aside>
